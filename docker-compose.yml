services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: gdgocode_cloud_track
      POSTGRES_USER: gdgocode_user
      POSTGRES_PASSWORD: gdgocode_pass
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gdgocode_user -d gdgocode_cloud_track"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    image: gdgocode-cloud-track-backend-local
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-3001}:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    image: gdgocode-cloud-track-frontend-local
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL}
      VITE_EVENT_NAME: ${VITE_EVENT_NAME}
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    restart: unless-stopped

volumes:
  postgres-data:
