name: Publish Docker Images

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FRONTEND_IMAGE: gdgocode-cloud-track-frontend
  BACKEND_IMAGE: gdgocode-cloud-track-backend

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            dir: frontend
            install: npm ci
            check: npm run build
          - name: backend
            dir: backend
            install: npm ci
            check: npm run check && npm run build
    defaults:
      run:
        working-directory: ${{ matrix.dir }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up root Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        working-directory: .
        run: npm ci

      - name: Check formatting
        working-directory: .
        run: npm run format:check

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.dir }}/package-lock.json

      - name: Install
        run: ${{ matrix.install }}

      - name: Validate
        shell: bash
        run: ${{ matrix.check }}

  publish:
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            image: gdgocode-cloud-track-frontend
          - service: backend
            context: ./backend
            image: gdgocode-cloud-track-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        shell: bash
        run: echo "value=sha-$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Build and push backend
        if: matrix.service == 'backend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Build and push frontend
        if: matrix.service == 'frontend'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
